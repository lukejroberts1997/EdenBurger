<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Eden Burger</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --red: #c0392b;
        --yellow: #f1c40f;
        --cream: #fdf6ec;
        --dark: #1a0800;
        --brown: #6b3a1f;
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", sans-serif;
      }

      /* ───── SHARED ───── */
      .page {
        display: none;
        min-height: 100vh;
        width: 100%;
      }
      .page.active {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* ───── COUNTDOWN PAGE ───── */
      #countdown-page {
        background: var(--dark);
        padding: 2rem 1.25rem 3rem;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* subtle radial glow */
      #countdown-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 40%,
          rgba(192, 57, 43, 0.18) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.4rem, 10vw, 4.5rem);
        font-weight: 700;
        color: var(--yellow);
        letter-spacing: 0.04em;
        line-height: 1;
        margin-bottom: 0.3rem;
      }

      .logo-sub {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: clamp(0.85rem, 3.5vw, 1.1rem);
        color: var(--cream);
        opacity: 0.6;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 2.5rem;
      }

      .burger-icon {
        font-size: clamp(3rem, 14vw, 6rem);
        margin-bottom: 2rem;
        animation: float 3s ease-in-out infinite;
        display: block;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .teaser {
        font-size: clamp(0.9rem, 3.8vw, 1.05rem);
        color: var(--cream);
        opacity: 0.75;
        letter-spacing: 0.06em;
        margin-bottom: 2.8rem;
        font-weight: 300;
      }

      /* countdown tiles */
      .tiles {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        width: 100%;
        max-width: 320px;
        margin-bottom: 2rem;
      }

      .tile {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(241, 196, 15, 0.2);
        border-radius: 16px;
        padding: 1.4rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .tile-num {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.6rem, 12vw, 3.8rem);
        font-weight: 700;
        color: var(--yellow);
        line-height: 1;
        display: block;
      }

      .tile-label {
        font-size: 0.68rem;
        color: var(--cream);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        margin-top: 0.4rem;
        display: block;
      }

      .footnote {
        font-size: clamp(0.72rem, 2.8vw, 0.82rem);
        color: var(--cream);
        opacity: 0.35;
        letter-spacing: 0.08em;
        margin-top: 0.5rem;
      }

      /* ───── BIRTHDAY PAGE ───── */
      #birthday-page {
        background: url("image.png") repeat;
        background-size: 100px auto;
        padding: 2.5rem 1.25rem 3rem;
        text-align: center;
      }

      .bday-header {
        margin-bottom: 1.8rem;
      }

      .bday-logo {
        position: relative;
        height: 1.2em;
        font-size: clamp(1.8rem, 8vw, 3rem);
        margin-bottom: 0.1em;
      }

      .morph-text {
        position: absolute;
        left: 0;
        right: 0;
        font-family: "Playfair Display", serif;
        font-size: 1em;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.04em;
        line-height: 1;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
        will-change: opacity, filter;
      }

      #morph-from { opacity: 1; }
      #morph-to   { opacity: 0; }

      .bday-tagline {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: clamp(1rem, 4.5vw, 1.4rem);
        color: #fff;
        margin-top: 0.4rem;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      }

      .bday-icons {
        font-size: clamp(1.4rem, 5vw, 2rem);
        margin-top: 0.5rem;
        letter-spacing: 0.1em;
      }

      /* responsive 16:9 video wrapper */
      .video-wrap {
        position: relative;
        width: 100%;
        max-width: 640px;
        margin: 0 auto 1.8rem;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(192, 57, 43, 0.18);
        background: #000;
      }

      .video-wrap::before {
        content: "";
        display: block;
        padding-top: 56.25%; /* 16:9 */
      }

      .video-wrap iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .bday-message {
        font-size: clamp(0.9rem, 3.8vw, 1.05rem);
        color: #fff;
        max-width: 480px;
        line-height: 1.7;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      }

      /* ───── TRIP BUTTON (replaces bday-message) ───── */
      .trip-btn {
        background: rgba(255,255,255,0.15);
        border: 2px solid rgba(255,255,255,0.7);
        color: #fff;
        font-family: "Playfair Display", serif;
        font-size: clamp(1rem, 4.5vw, 1.2rem);
        letter-spacing: 0.06em;
        padding: 0.75rem 2rem;
        border-radius: 99px;
        cursor: pointer;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        transition: background 0.2s, transform 0.2s;
      }
      .trip-btn:hover {
        background: rgba(255,255,255,0.28);
        transform: scale(1.03);
      }

      /* ───── TRIP PAGE ───── */
      #trip-page {
        background: url("image.png") repeat;
        background-size: 100px auto;
        padding: 2.5rem 1.25rem 3rem;
        text-align: center;
        justify-content: flex-start;
        padding-top: 3rem;
      }

      .trip-inner {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }

      .trip-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 9vw, 3rem);
        font-weight: 700;
        color: #fff;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        line-height: 1;
      }

      .trip-dates {
        font-family: "Inter", sans-serif;
        font-size: clamp(1.1rem, 5vw, 1.4rem);
        font-weight: 600;
        color: #fff;
        text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      }

      .map-wrap {
        position: relative;
        width: 100%;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      }
      .map-wrap::before {
        content: '';
        display: block;
        padding-top: 65%;
      }
      .map-wrap iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .trip-address {
        font-size: clamp(0.82rem, 3.2vw, 0.95rem);
        color: #fff;
        text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        opacity: 0.85;
      }

      .download-btn {
        display: inline-block;
        background: rgba(255,255,255,0.15);
        border: 2px solid rgba(255,255,255,0.7);
        color: #fff;
        font-size: clamp(0.9rem, 3.8vw, 1rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 0.75rem 1.75rem;
        border-radius: 99px;
        text-decoration: none;
        backdrop-filter: blur(4px);
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        transition: background 0.2s, transform 0.2s;
        margin-bottom: 1rem;
      }
      .download-btn:hover {
        background: rgba(255,255,255,0.28);
        transform: scale(1.03);
      }

      /* ───── DESKTOP tweaks ───── */
      @media (min-width: 640px) {
        .tile {
          min-width: 100px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ░░ PAGE 1 – COUNTDOWN ░░ -->
    <section class="page" id="countdown-page">
      <span class="burger-icon">🍔</span>
      <h1 class="logo">Eden Burger</h1>
      <p class="teaser">Something is coming your way…</p>

      <div class="tiles">
        <div class="tile">
          <span class="tile-num" id="days">00</span>
          <span class="tile-label">Days</span>
        </div>
        <div class="tile">
          <span class="tile-num" id="hours">00</span>
          <span class="tile-label">Hours</span>
        </div>
        <div class="tile">
          <span class="tile-num" id="minutes">00</span>
          <span class="tile-label">Mins</span>
        </div>
        <div class="tile">
          <span class="tile-num" id="seconds">00</span>
          <span class="tile-label">Secs</span>
        </div>
      </div>

      <button
        onclick="showPage('birthday-page')"
        style="
          margin-top: 2rem;
          background: none;
          border: 1px solid rgba(241, 196, 15, 0.3);
          color: rgba(253, 246, 236, 0.35);
          font-size: 0.7rem;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          padding: 0.5rem 1rem;
          border-radius: 99px;
          cursor: pointer;
        "
      >
        Preview birthday page
      </button>
    </section>

    <!-- ░░ PAGE 2 – BIRTHDAY ░░ -->
    <section class="page" id="birthday-page">
      <div class="bday-header">
        <div class="bday-logo">
          <span class="morph-text" id="morph-from">Eden Burger</span>
          <span class="morph-text" id="morph-to">Edinburgh</span>
        </div>
        <div class="bday-tagline">HAPPY BIRTHDAY ME LEEEEEEF ❤️</div>
        <div class="bday-icons">🎂 🍔 🎉</div>
      </div>

      <div class="video-wrap" id="video-wrap" style="display:none">
        <!-- TODO: replace VIDEO_ID with your YouTube video ID -->
        <iframe
          id="bday-video"
          src="about:blank"
          data-src="https://www.youtube.com/embed/jNQXAC9IVRw?autoplay=1&rel=0"
          title="Happy Birthday"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
        >
        </iframe>
      </div>



      <button
        id="bday-message"
        class="bday-message trip-btn"
        style="display:none"
        onclick="showPage('trip-page')"
      >
        See your surprise ✨
      </button>
    </section>

    <!-- ░░ PAGE 3 – TRIP DETAILS ░░ -->
    <section class="page" id="trip-page">
      <div class="trip-inner">
        <h2 class="trip-title">Your Trip 🏴󠁧󠁢󠁳󠁣󠁴󠁿</h2>
        <p class="trip-dates">Thursday 19th November — Sunday 22nd November</p>

        <div class="map-wrap">
          <iframe
            src="https://maps.google.com/maps?q=55.957825,-3.1745885&z=16&output=embed"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <p class="trip-address">Six Brunton Place Guest House, Edinburgh</p>

        <a class="download-btn" href="email.pdf" download>
          📄 Download Booking Confirmation
        </a>
      </div>
    </section>

    <!-- hidden SVG filter used by the morph animation -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <filter id="morph-filter" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence id="morph-turb" type="fractalNoise" baseFrequency="0" numOctaves="3" seed="2" result="noise"/>
          <feDisplacementMap id="morph-disp" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <script>
      const TARGET = new Date("2026-03-18T00:00:00").getTime();

      const pad = (n) => String(n).padStart(2, "0");

      // ── morph animation ──────────────────────────────────────────
      const MORPH_DURATION = 15 * 1000; // 15 seconds
      let morphRaf = null;
      let morphStart = null;

      const morphFrom = document.getElementById('morph-from');
      const morphTo   = document.getElementById('morph-to');
      const morphTurb = document.getElementById('morph-turb');
      const morphDisp = document.getElementById('morph-disp');

      function startMorph() {
        if (morphRaf) return; // already running
        morphStart = null;
        morphRaf = requestAnimationFrame(morphStep);
      }

      function morphStep(ts) {
        if (!morphStart) morphStart = ts;
        const t = Math.min((ts - morphStart) / MORPH_DURATION, 1); // 0 → 1

        // Bell curve: peaks at t=0.5, zero at t=0 and t=1
        const bell = Math.sin(t * Math.PI);

        const maxBlur  = 28;   // px
        const maxFreq  = 0.022;
        const maxScale = 90;

        const blur  = bell * maxBlur;
        const freq  = bell * maxFreq;
        const scale = bell * maxScale;

        morphTurb.setAttribute('baseFrequency', freq.toFixed(4));
        morphDisp.setAttribute('scale', scale.toFixed(1));

        const filterVal = `url(#morph-filter) blur(${(blur * 0.35).toFixed(1)}px)`;
        morphFrom.style.filter = filterVal;
        morphTo.style.filter   = filterVal;

        morphFrom.style.opacity = (1 - t).toFixed(4);
        morphTo.style.opacity   = t.toFixed(4);

        if (t < 1) {
          morphRaf = requestAnimationFrame(morphStep);
        } else {
          morphRaf = null;
          onMorphComplete();
        }
      }
      function onMorphComplete() {
        // show video & message with a small fade-in
        const wrap = document.getElementById('video-wrap');
        const msg  = document.getElementById('bday-message');
        const iframe = document.getElementById('bday-video');

        // load the video now so it autoplays at the right moment
        iframe.src = iframe.dataset.src;

        wrap.style.opacity = '0';
        wrap.style.transition = 'opacity 0.8s ease';
        wrap.style.display = '';
        msg.style.opacity = '0';
        msg.style.transition = 'opacity 0.8s ease 0.3s';
        msg.style.display = '';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            wrap.style.opacity = '1';
            msg.style.opacity  = '1';
          });
        });
      }
      // ─────────────────────────────────────────────────────────────

      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        if (id === 'birthday-page') startMorph();
      }

      let currentPage = null;

      function tick() {
        const now = Date.now();
        const diff = TARGET - now;

        if (diff <= 0) {
          if (currentPage !== "birthday-page") {
            currentPage = "birthday-page";
            showPage("birthday-page");
          }
          return;
        }

        if (currentPage !== "countdown-page") {
          currentPage = "countdown-page";
          showPage("countdown-page");
        }

        const totalSecs = Math.floor(diff / 1000);
        const secs = totalSecs % 60;
        const mins = Math.floor(totalSecs / 60) % 60;
        const hours = Math.floor(totalSecs / 3600) % 24;
        const days = Math.floor(totalSecs / 86400);

        document.getElementById("days").textContent = pad(days);
        document.getElementById("hours").textContent = pad(hours);
        document.getElementById("minutes").textContent = pad(mins);
        document.getElementById("seconds").textContent = pad(secs);
      }

      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
